###############################################################################
# config.yaml — Investment Agent Configuration
# Every numeric value in the pipeline is here. Defaults are research-backed
# starting points. GA/NN/RL will optimize subsets of these.
###############################################################################
version: "2.1"
last_updated: "2025-05-30"
description: "Multi-agent retirement portfolio optimizer — 10yr horizon"

#═══════════════════════════════════════════════════════════════════════════
# ACCOUNT CONFIGURATION
#═══════════════════════════════════════════════════════════════════════════
accounts:
  tfsa:
    initial_balance:     20000.0    # CAD
    annual_room:         7000.0     # 2024 limit
    room_inflation:      0.03       # ~3% annual increase
    withdraw_tax_rate:   0.0        # Tax-free withdrawals
    rrsp_room_offset:    0.0        # not applicable

  rrsp:
    initial_balance:     30000.0
    annual_room:         6000.0     # approximate based on income
    withdraw_tax_rate:   0.25       # effective rate in retirement
    withdrawal_order:    2          # 2nd priority (after TFSA)

  margin:
    initial_balance:     0.0
    available_credit:    50000.0    # margin available if needed
    daily_interest_rate: 0.0002     # ~7.3% annual on margin borrow

#═══════════════════════════════════════════════════════════════════════════
# RETIREMENT GOAL
#═══════════════════════════════════════════════════════════════════════════
retirement:
  horizon_years:           10
  annual_withdrawal:       12000.0    # $1,000/mo living expenses
  withdrawal_month:        12         # December
  withdrawal_order:        ["TFSA", "RRSP", "MARGINAL"]
  target_terminal_value:   250000.0   # minimum to feel comfortable retiring
  income_tax_bracket:      3          # 3rd bracket: $111,734 - $173,205 (2024 AB)
  province:                "AB"

#═══════════════════════════════════════════════════════════════════════════
# LAYER 0 — UNIVERSE SCREENER
#═══════════════════════════════════════════════════════════════════════════
screener:
  # Data sources
  symbol_source:           "currentdata_html"   # 404 symbols from CurrentData/
  cibc_eligible:           true                  # only CIBC Investor's Edge eligible
  exchanges:               ["TSX", "TSXV", "NYSE", "NASDAQ", "AMEX", "ARCA"]

  # Price/volume filters
  min_price:               5.0       # CAD/USD — no penny stocks
  min_avg_volume:          100000    # shares/day (3-month avg)
  min_market_cap:          1.0e9     # $1B minimum

  # Buffett fundamentals (5-year averages)
  min_roe:                 0.15      # ROE > 15%
  max_debt_equity:         0.5       # D/E < 0.5
  min_fcf_years:           5         # positive FCF for 5 of last 5 years
  min_gross_margin:        0.40      # gross margin > 40%
  max_pe:                  30.0      # sanity check
  min_yeild:               0.0       # no minimum dividend — growth OK

  # Dividend-specific (for cash-flow strategy)
  min_div_yield:           2.0       # % annual yield
  min_div_years:           5         # consecutive years paying
  payout_ratio_max:        0.75      # < 75% of earnings
  div_growth_min_5y:      0.03      # 3% annual dividend growth

  # Output
  max_candidates:          100       # max symbols passing all filters

#═══════════════════════════════════════════════════════════════════════════
# LAYER 1 — SIGNAL GENERATION (Multi-Horizon Consensus)
#═══════════════════════════════════════════════════════════════════════════
signals:
  # Analysis horizons — based on correlation study
  short_horizon_days:      3         # entry timing (BB, MA position)
  medium_horizon_days:     20        # direction, regime, position sizing
  dividend_horizon_days:   90        # cash flow planning, quarterly cycle

  # Consensus voting
  min_strategies_agree:    3         # need 3+ of 15 strategies to signal
  conviction_threshold:    0.6       # 0-1 scale
  strong_conviction:       0.8       # strong signal threshold

  # Strategy weights (sum to 1.0 — GA will optimize)
  strategies:
    sma_crossover:         0.08      # SMA 50/200 golden/death cross
    bollinger_position:    0.12      # price within Bollinger band
    macd_hist:             0.10      # MACD histogram direction
    rsi_extreme:           0.08      # RSI < 30 or > 70
    stochastic_oversold:   0.07      % Stoch < 20
    adx_trend:             0.07      # ADX > 25 trending
    breakout_20d:          0.08      # 20-day high breakout
    mean_reversion_5d:     0.05      # 5-day zscore extreme
    natr_volatility:       0.10      # NATR percentile (risk)
    obv_confirm:           0.05      # OBV rising
    dividend_capture:      0.10      # quarterly ex-div timing
    iv_percentile:         0.05      # options implied vol percentile
    momentum_12m:          0.05      # 12-month momentum (Jegadeesh-Titman)

  # Regime filter
  adx_min_trend:           20        # ADX < 20 = choppy, avoid trend trades
  vix_max_entry:           30        # don't enter new positions in panic

#═══════════════════════════════════════════════════════════════════════════
# LAYER 2 — MONEY MANAGEMENT
#═══════════════════════════════════════════════════════════════════════════
money_management:
  # Risk per trade
  max_risk_per_trade:      0.01      # 1% of portfolio per trade
  max_portfolio_risk:      0.08      # 8% total heat (sum of all position risks)
  max_single_position:     0.15      # 15% max in one symbol
  max_sector_concentration: 0.25     # 25% max in one sector

  # Position sizing
  atr_stop_multiplier:     2.5      # stop = entry − 2.5 × ATR(14)
  atr_period:              14        # ATR lookback
  position_model:          "risk_parity"  # risk_parity | equal_weight | kelly

  # Dollar-cost averaging
  dca_enabled:             true
  dca_min_conviction:      0.7       # only DCA if conviction > 0.70
  dca_installments:        3         # enter over 3 separate orders
  dca_intervals_days:      [0, 5, 10]  # days after signal to enter

  # Trailing stops
  trailing_stop_trigger:   0.03      # activate trailing stop after +3%
  trailing_stop_atr_mult:  1.5       # trail at 1.5 × ATR below high-water

  # Exit strategy
  exit_on_conviction_drop: 0.3       # exit if conviction drops below 0.3
  exit_on_stop:            true       # use ATR stop
  exit_turnaround_days:    60        # reconsider after exit (cooldown)

  # Satellite allocation (riskier plays)
  satellite_pct:           0.10      # 10% of portfolio for satellite
  satellite_max_drawdown:  0.05      # 5% max DD for satellite vs 15% core
  satellite_max_positions: 5         # max 5 satellite positions

#═══════════════════════════════════════════════════════════════════════════
# LAYER 3 — PORTFOLIO CONSTRUCTION
#═══════════════════════════════════════════════════════════════════════════
portfolio:
  # Geographic allocation — LET GA OPTIMIZE, these are constraints not targets
  max_us_allocation:       0.50      # max 50% US
  max_intl_allocation:     0.25      # max 25% international
  min_cdn_allocation:      0.25      # min 25% Canadian
  max_forex_exposure:      0.45      # max % of portfolio exposed to non-CAD

  # Sector constraints
  min_sectors:             5         # at least 5 sectors represented
  max_single_sector:       0.30      # 30% max in one sector

  # Position limits
  max_positions:           15
  min_positions:           5         # at least 5 for diversification
  rebalance_frequency_days: 30       # review monthly

  # Tax-loss harvesting
  tlh_enabled:             true
  tlh_min_loss:            0.05      # harvest losses > 5%
  tlh_min_tax_saving:      50.0      # only if saves $50+ in tax
  tlh_wash_days:           30        # can't buy back within 30 days
  tlh_month:               12        # December tax-loss harvesting

  # Dividend calendar
  div_capture_enabled:     true
  div_lookahead_days:      90        # plan 3 quarters ahead
  reinvest_threshold:      500.0     # auto-reinvest if div > $500
  cash_buffer_pct:         0.05      # keep 5% cash buffer

#═══════════════════════════════════════════════════════════════════════════
# LAYER 4 — RISK MANAGEMENT
#═══════════════════════════════════════════════════════════════════════════
risk_management:
  # Drawdown protection
  portfolio_dd_threshold:  0.15      # >15% DD → reduce risk
  emergency_dd_threshold:  0.25      # >25% DD → shift to cash
  emergency_shift_pct:     0.30      # shift 30% to cash if emergency dd

  # Position protection
  daily_loss_limit:        0.03      # exit if single position drops 3% in a day
  weekly_loss_limit:       0.07      # exit if position drops 7% in a week

  # Market regime
  vix_panic_threshold:     30        # VIX > 30 → halve position sizes
  vix_extreme_threshold:   40        # VIX > 40 → shift 50% to cash

  # Correlation
  max_avg_correlation:     0.75      # if portfolio avg corr > 0.75, too concentrated
  correlation_window_days: 60

  # Forex
  track_forex:             true                   # USD/CAD tracking
  forex_hedge_threshold:    0.20                   # if >20% non-CAD, consider hedging
  forex_symbol:            "USDCAD.FOREX"         # or use FXC.TO ETF
  usd_account:             true                    # CIBC Investor's Edge USD acct

#═══════════════════════════════════════════════════════════════════════════
# OPTIONS TRACKING (L1 signal + future trading)
#═══════════════════════════════════════════════════════════════════════════
options:
  tracking_enabled:        true
  # Signal layer
  iv_percentile_lookback:  252      # 1 year of IV data
  iv_percentile_entry:     30       # buy underlying when IV < 30th percentile
  iv_percentile_exit:      70       # exit/trim when IV > 70th percentile
  put_call_ratio_alert:   1.2      # unusual put activity alert

  # Future trading (90 days from now, 1-2% of portfolio)
  trading_enabled:         false    # toggle on after 90 days
  max_options_allocation:  0.02     # 2% max
  min_expiry_days:         30       # minimum DTE
  max_expiry_days:         90       # max DTE
  strategies:
    - "covered_call"               # on existing positions
    - "cash_secured_put"           # on watchlist candidates
  max_concurrent_options:  5

#═══════════════════════════════════════════════════════════════════════════
# GA OPTIMIZER
#═══════════════════════════════════════════════════════════════════════════
ga:
  population_size:         200
  generations:             100
  crossover_prob:          0.7
  mutation_prob:           0.2
  tournament_size:         5
  elitism:                 true
  elite_pct:               0.05      # top 5% survive unchanged
  fitness_objective:       "after_tax_terminal_value"
  fitness_penalty_drawdown: 2.0      # λ weight on drawdown penalty
  n_workers:               4         # parallel evaluation

#═══════════════════════════════════════════════════════════════════════════
# NN (PyTorch LSTM)
#═══════════════════════════════════════════════════════════════════════════
nn:
  model:                   "LSTM"
  input_features:          120       # indicators
  lookback_days:           60        # 3 months of daily data
  predict_horizon:         20        # predict 20d forward return
  hidden_size:             128
  num_layers:              2
  dropout:                 0.2
  batch_size:              64
  epochs:                  50
  learning_rate:           0.001
  train_years:             5         # training window
  val_years:               2         # validation window
  test_years:              1         # test window

#═══════════════════════════════════════════════════════════════════════════
# RL (SB3 PPO)
#═══════════════════════════════════════════════════════════════════════════
rl:
  algorithm:               "PPO"
  timesteps:               100000
  learning_rate:           0.0003
  n_steps:                 2048
  batch_size:              64
  gamma:                   0.99
  gae_lambda:              0.95
  clip_range:              0.2
  reward_function:         "after_tax_pnl_minus_costs"
  position_sizing_model:   "continuous"  # continuous | discrete

#═══════════════════════════════════════════════════════════════════════════
# BLENDER
#═══════════════════════════════════════════════════════════════════════════
blender:
  # Weights sum to 1.0 — dynamically adjusted based on recent Sharpe
  ga_weight:               0.40      # static strategic allocation
  nn_weight:               0.35      # tactical directional
  rl_weight:               0.25      # dynamic rebalancing
  # Adaptive: every 90 days, re-weight by trailing 90-day Sharpe ratio

#═══════════════════════════════════════════════════════════════════════════
# BACKTESTING
#═══════════════════════════════════════════════════════════════════════════
backtesting:
  walk_forward:            true
  train_start:             "2014-01-01"
  train_end:               "2018-12-31"
  test_start:              "2019-01-01"
  test_end:                "2024-12-31"
  step_forward_days:       252       # roll forward 1 year
  transaction_cost:        9.95      # per trade
  slippage_pct:            0.001     # 0.1% slippage
  fill_model:              "midpoint" # assumes mid of day's range
  benchmark:               "XIC.TO"  # TSX Composite as baseline

#═══════════════════════════════════════════════════════════════════════════
# DATA SOURCES
#═══════════════════════════════════════════════════════════════════════════
data:
  price_source:            "yfinance"    # primary
  fundamental_source:      "yfinance"    # income statement etc
  forex_source:            "yfinance"    # USDCAD=X
  options_source:          "yfinance"    # Yahoo options chain
  news_source:             "yahoo_finance" # for L0 screening
  db_host:                 "ksfraser.ca"
  db_name:                 "ksfraser_stock_market"
  db_user:                 "ksfraser_stockmarket"
  backup_dir:              "/root/.hermes/workspace/ksf_stockmarket/backups/"

#═══════════════════════════════════════════════════════════════════════════
# LOGGING & NOTIFICATIONS
#═══════════════════════════════════════════════════════════════════════════
logging:
  level:                   "INFO"
  log_dir:                 "/root/.hermes/workspace/ksf_stockmarket/logs/"
  daily_report:            true
  weekly_report:           true
  alert_on_drawdown:       0.05       # 5% DD triggers alert
  alert_on_signal_change:  true
